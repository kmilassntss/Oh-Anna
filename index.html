<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Playlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  background: linear-gradient(-45deg, #ff4da6, #ff99cc, #121212, #ff66b2);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  height: 100vh;
  overflow: hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🎬 INTRO SCREEN */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

#intro img {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255, 77, 166, 0.8);
  cursor: pointer;
  transition: 0.3s;
}

#intro img:hover {
  transform: scale(1.05);
}

#intro h2 {
  margin-top: 20px;
  color: #ff4da6;
}

/* 📜 MAIN LAYOUT (hidden at start) */
.container {
  display: none;
  height: 100vh;
}

/* 📜 LEFT PLAYLIST */
.sidebar {
  width: 280px;
  background: rgba(30, 30, 30, 0.75);
  padding: 20px;
  backdrop-filter: blur(10px);
  overflow-y: auto;
}

.sidebar h2 {
  color: #ff4da6;
}

.track {
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.track:hover {
  background: #333;
}

.track.active {
  background: #ff4da6;
}

/* 🎯 CENTER PLAYER */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.player-box {
  text-align: center;
  background: rgba(30, 30, 30, 0.6);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(255, 77, 166, 0.4);
  transform: translateX(40px);
}

/* 💿 cover */
#cover {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255, 77, 166, 0.7);

  opacity: 0;
  transform: scale(0.8);
  transition: all 0.4s ease;
}

#cover.show {
  opacity: 1;
  transform: scale(1);
}

#cover.spin {
  animation: spin 4s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg) scale(1); }
  to { transform: rotate(360deg) scale(1); }
}

.title {
  font-size: 22px;
  margin-top: 15px;
}

audio {
  width: 280px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🎬 INTRO SCREEN -->
<div id="intro">
  <img id="introCover" src="images/cover.png">
  <h2>Click to enter playlist</h2>
</div>

<!-- 📜 MAIN APP -->
<div class="container" id="app">

  <div class="sidebar">
    <h2>Oh Anna</h2>
    <div id="playlist"></div>
  </div>

  <div class="main">
    <div class="player-box">
      <img id="cover" src="">
      <div class="title" id="nowPlaying">Select a track</div>
      <audio id="player" controls></audio>
    </div>
  </div>

</div>

<script>
const tracks = [
  {
    src: "music/1. Camila.mp3",
    title: "1. Camila",
    cover: "images/cover.png"
  },
  {
    src: "music/2. Let It Happen.mp3",
    title: "2. Let It Happen",
    cover: "images/let it happen.jpg"
  },
  {
    src: "music/3. Wildo.mp3",
    title: "3. Wildo",
    cover: "images/cover.png"
  },
  {
    src: "music/4. Unbothered.mp3",
    title: "4. Unbothered",
    cover: "images/unbothered.jpg"
  },
  {
    src: "music/5. Linda Maria.mp3",
    title: "5. Linda Maria",
    cover: "images/cover.png"
  },
  {
    src: "music/6. MAYBE.mp3",
    title: "6. MAYBE",
    cover: "images/maybe.jpg"
  },
  {
    src: "music/9. Kathia.mp3",
    title: "9. Kathia",
    cover: "images/cover.png"
  },
  {
    src: "music/10. There Is a Light That Never Goes Out - 2011 Remaster.mp3",
    title: "10. There Is a Light That Never Goes Out - 2011 Remaster",
    cover: "images/There Is a Light That Never Goes Out - 2011 Remaster.jpg"
  },
  {
    src: "music/15. Siham.mp3",
    title: "15. Siham",
    cover: "images/cover.png"
  },
  {
    src: "music/16. DtMF.mp3",
    title: "16. DtMF",
    cover: "images/dtmf.png"
  },
  {
    src: "music/17. Leonela.mp3",
    title: "17. Leonela",
    cover: "images/cover.png"
  },
  {
    src: "music/18. Fantasmeo.mp3",
    title: "18. Fantasmeo",
    cover: "images/fantasmeo.jpg"
  },
  {
    src: "music/19. Delmy.mp3",
    title: "19. Delmy",
    cover: "images/cover.png"
  },
  {
    src: "music/20. See You Again (feat. Kali Uchis).mp3",
    title: "20. See You Again (feat. Kali Uchis)",
    cover: "images/See You Again (feat. Kali Uchis).jpg"
  },
  {
    src: "music/21. Pichula.mp3",
    title: "21. Pichula",
    cover: "images/cover.png"
  },
  {
    src: "music/22. Ewok Celebration and Finale.mp3",
    title: "22. Ewok Celebration and Finale",
    cover: "images/ewok.jpg"
  },
  {
    src: "music/23. Carmen.mp3",
    title: "23. Mamá",
    cover: "images/cover.png"
  },
  {
    src: "music/24. BUENOS AIRES.mp3",
    title: "24. BUENOS AIRES",
    cover: "images/bueno aires.jpg"
  },
  {
    src: "music/25. Ricardo.mp3",
    title: "25. Papá",
    cover: "images/cover.png"
  },
  {
    src: "music/26. Chasing Cars.mp3",
    title: "26. Chasing Cars",
    cover: "images/chasing cars.jpg"
  }
];

const intro = document.getElementById("intro");
const app = document.getElementById("app");

const playlist = document.getElementById('playlist');
const player = document.getElementById('player');
const nowPlaying = document.getElementById('nowPlaying');
const cover = document.getElementById('cover');

let currentIndex = 0;
let elements = [];

/* 🎬 enter site */
document.getElementById("introCover").addEventListener("click", () => {
  intro.style.display = "none";
  app.style.display = "flex";
  loadTrack(0);
});

/* 🎵 load track */
function loadTrack(index) {
  currentIndex = index;

  player.src = tracks[index].src;
  player.play();

  nowPlaying.textContent = tracks[index].title;

  cover.classList.remove("show", "spin");

  setTimeout(() => {
    cover.src = tracks[index].cover;
    cover.classList.add("show", "spin");
  }, 100);

  elements.forEach(el => el.classList.remove('active'));
  elements[index].classList.add('active');
}

/* 📜 playlist */
tracks.forEach((track, index) => {
  const div = document.createElement('div');
  div.className = 'track';
  div.textContent = track.title;

  div.addEventListener('click', () => loadTrack(index));

  playlist.appendChild(div);
  elements.push(div);
});

/* ⏭ auto next */
player.addEventListener('ended', () => {
  let next = (currentIndex + 1) % tracks.length;
  loadTrack(next);
});
</script>

</body>
</html>
